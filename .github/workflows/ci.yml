name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build runtime image
        run: docker build --target runtime -t rto-audit:ci .
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: rto-audit:ci
          severity: "CRITICAL,HIGH"
          exit-code: "0"
      - name: Validate Kubernetes manifests
        run: |
          docker run --rm -v "${{ github.workspace }}/k8s:/k8s" ghcr.io/yannh/kubeconform:latest \
            -summary -kubernetes-version 1.29.0 /k8s/configmap.yaml /k8s/postgres.yaml \
            /k8s/localstack.yaml /k8s/dashboard.yaml /k8s/cronjob-produce.yaml \
            /k8s/cronjob-ingest.yaml /k8s/secret.example.yaml

  push-image:
    needs: [test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
