apiVersion: v1
kind: ConfigMap
metadata:
  name: rto-audit-config
data:
  PYTHONUNBUFFERED: "1"
  STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
  STREAMLIT_SERVER_PORT: "8501"
  STREAMLIT_SERVER_HEADLESS: "true"
  STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
  S3_ENDPOINT_URL: "http://rto-audit-localstack:4566"
  S3_BUCKET_NAME: "rto-audit-events"
