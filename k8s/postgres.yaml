apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rto-audit-postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rto-audit-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rto-audit-postgres
  template:
    metadata:
      labels:
        app: rto-audit-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "rto_audit"
            - name: POSTGRES_PASSWORD
              value: "rto_audit"
            - name: POSTGRES_DB
              value: "rto_audit"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "rto_audit", "-d", "rto_audit"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rto-audit-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: rto-audit-postgres
spec:
  type: ClusterIP
  selector:
    app: rto-audit-postgres
  ports:
    - port: 5432
      targetPort: 5432
